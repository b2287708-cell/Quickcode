<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التوجيه...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap'); body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="flex items-center justify-center h-screen bg-slate-50">

    <div class="text-center">
        <i class="fa-solid fa-spinner fa-spin text-4xl text-indigo-600 mb-4"></i>
        <h2 id="msg" class="text-2xl font-bold text-slate-800 mb-2">جاري التوجيه للرابط...</h2>
        <p class="text-slate-500 text-sm">بواسطة منصة كويك كود</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5KPswVjsEuctvxu5nJZzwPQYx_a2CJcA",
            authDomain: "quick-code-f298e.firebaseapp.com",
            projectId: "quick-code-f298e",
            storageBucket: "quick-code-f298e.firebasestorage.app",
            messagingSenderId: "1093557974042",
            appId: "1:1093557974042:web:fdda9c0225e92c885a8da3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const shortId = urlParams.get('id');

        if (shortId) {
            const docRef = doc(db, "qrcodes", shortId);
            getDoc(docRef).then((docSnap) => {
                if (docSnap.exists()) {
                    updateDoc(docRef, { clicks: increment(1) }).then(() => {
                        window.location.replace(docSnap.data().originalUrl);
                    });
                } else {
                    document.getElementById('msg').innerHTML = "<span class='text-red-500'>هذا الرابط غير موجود.</span>";
                }
            });
        } else {
            document.getElementById('msg').innerText = "رابط غير صالح.";
        }
    </script>
</body>
</html>
