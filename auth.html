<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - كويك كود</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap'); body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="flex items-center justify-center h-screen p-4 bg-slate-100">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center border border-slate-200">
        <div class="flex justify-center mb-6 text-indigo-600 text-6xl">
            <i class="fa-solid fa-qrcode"></i>
        </div>
        <h1 class="text-3xl font-black mb-2 text-slate-800">كويك كود</h1>
        <p class="text-slate-500 mb-8 font-medium">أدِر روابطك وزياراتك باحترافية.</p>

        <button id="googleBtn" class="w-full bg-white border-2 border-slate-200 py-4 rounded-2xl flex justify-center items-center gap-3 hover:bg-slate-50 transition shadow-sm">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
            <span class="font-bold text-slate-700">المتابعة باستخدام جوجل</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5KPswVjsEuctvxu5nJZzwPQYx_a2CJcA",
            authDomain: "quick-code-f298e.firebaseapp.com",
            projectId: "quick-code-f298e",
            storageBucket: "quick-code-f298e.firebasestorage.app",
            messagingSenderId: "1093557974042",
            appId: "1:1093557974042:web:fdda9c0225e92c885a8da3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('googleBtn').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert("تم إغلاق النافذة أو حدث خطأ.");
            }
        };
    </script>
</body>
</html>
