<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة كويك كود - الكارت الاحترافي</title>

    <!-- حل مشكلة صورة التطبيق (بدل حرف الـ G الرمادي) سيظهر اللوجو الخاص بنا -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2212%22 height=%2212%22 rx=%223%22 fill=%22%234f46e5%22/><rect x=%2216%22 width=%2212%22 height=%2212%22 rx=%223%22 fill=%22%23818cf8%22/><rect y=%2216%22 width=%2212%22 height=%2212%22 rx=%223%22 fill=%22%23818cf8%22/><path d=%22M16 16H25C26.6569 16 28 17.3431 28 19V28H19C17.3431 28 16 26.6569 16 25V16Z%22 fill=%22%2310b981%22/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2212%22 height=%2212%22 rx=%223%22 fill=%22%234f46e5%22/><rect x=%2216%22 width=%2212%22 height=%2212%22 rx=%223%22 fill=%22%23818cf8%22/><rect y=%2216%22 width=%2212%22 height=%2212%22 rx=%223%22 fill=%22%23818cf8%22/><path d=%22M16 16H25C26.6569 16 28 17.3431 28 19V28H19C17.3431 28 16 26.6569 16 25V16Z%22 fill=%22%2310b981%22/></svg>">
    <meta name="theme-color" content="#4f46e5">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        
        /* نمط النقط الديجيتال الاحترافي للكارت (Digital Dot Pattern) للموقع فقط وليس التحميل */
        .bg-dots {
            background-color: #ffffff;
            background-image: radial-gradient(#cbd5e1 0.8px, transparent 0.8px);
            background-size: 14px 14px;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5KPswVjsEuctvxu5nJZzwPQYx_a2CJcA",
            authDomain: "quick-code-f298e.firebaseapp.com",
            projectId: "quick-code-f298e",
            storageBucket: "quick-code-f298e.firebasestorage.app",
            messagingSenderId: "1093557974042",
            appId: "1:1093557974042:web:fdda9c0225e92c885a8da3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        window.userIsPremium = false; // افتراضياً الحساب مجاني وستظهر الحقوق

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginStatus').classList.add('hidden');
                
                // جلب حالة الاشتراك الحقيقية للعميل من قاعدة البيانات (لإخفاء الحقوق لو كان Pro)
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().isPremium === true) {
                        window.userIsPremium = true;
                        document.getElementById('watermark-badge').classList.add('hidden');
                    }
                } catch (e) {
                    console.log("Error checking subscription status:", e);
                }
            } else {
                currentUser = null;
                document.getElementById('loginStatus').classList.remove('hidden');
            }
        });

        function generateShortId() { return Math.random().toString(36).substring(2, 8); }

        window.showToast = function(message, isError = false) {
            const toast = document.getElementById('toastNotif');
            const toastMsg = document.getElementById('toastMsg');
            const icon = toast.querySelector('i');
            
            toastMsg.textContent = message;
            
            if(isError) {
                toast.classList.replace('bg-emerald-500', 'bg-red-500');
                icon.className = 'fa-solid fa-triangle-exclamation';
            } else {
                toast.classList.replace('bg-red-500', 'bg-emerald-500');
                icon.className = 'fa-solid fa-check-circle';
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }

        window.updateCardAndSave = async function() {
            const name = document.getElementById('nameInput').value.trim() || "بدون اسم";
            const subName = document.getElementById('subNameInput').value.trim();
            let originalUrl = document.getElementById('urlInput').value.trim();
            const logoFile = document.getElementById('logoInput').files[0];

            if (!originalUrl) { showToast("يجب إدخال الرابط (URL) أولاً!", true); return; }
            if (!originalUrl.startsWith('http')) originalUrl = 'https://' + originalUrl;

            const btn = document.getElementById('generateBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin ml-2"></i> جاري التوليد...';
            btn.disabled = true;

            const shortId = generateShortId();
            const domain = window.location.origin; 
            const basePath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
            const smartUrl = `${domain}${basePath}/go.html?id=${shortId}`;

            try {
                if (currentUser) {
                    await setDoc(doc(db, "qrcodes", shortId), {
                        userId: currentUser.uid,
                        originalUrl: originalUrl,
                        name: name,
                        subName: subName,
                        shortId: shortId,
                        clicks: 0,
                        createdAt: serverTimestamp()
                    });
                }

                document.getElementById('card-title').textContent = name;
                document.getElementById('card-subtitle').textContent = subName;
                if (logoFile) {
                    document.getElementById('card-avatar').src = URL.createObjectURL(logoFile);
                }

                const qrContainer = document.getElementById('qr-container');
                qrContainer.innerHTML = "";

                const qrCode = new QRCodeStyling({
                    width: 220, height: 220,
                    data: smartUrl,
                    dotsOptions: { color: "#0f172a", type: "rounded" },
                    cornersSquareOptions: { color: "#4f46e5", type: "extra-rounded" },
                    cornersDotOptions: { color: "#0f172a", type: "dot" },
                    backgroundOptions: { color: "#ffffff" }
                });
                qrCode.append(qrContainer);
                
                document.getElementById('downloadBtn').classList.remove('hidden');
                showToast("تم توليد الكارت بنجاح!");

            } catch (error) {
                console.error("Error:", error);
                showToast("حدث خطأ أثناء الحفظ.", true);
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles ml-2"></i> تحديث وحفظ الكارت';
                btn.disabled = false;
            }
        }
    </script>
</head>
<body class="text-slate-800 pb-20">

    <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <svg width="36" height="36" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="12" height="12" rx="3" fill="#4f46e5"/>
                        <rect x="16" width="12" height="12" rx="3" fill="#818cf8"/>
                        <rect y="16" width="12" height="12" rx="3" fill="#818cf8"/>
                        <path d="M16 16H25C26.6569 16 28 17.3431 28 19V28H19C17.3431 28 16 26.6569 16 25V16Z" fill="#10b981"/>
                    </svg>
                    <span class="font-extrabold text-2xl text-slate-900">كويك كود</span>
                </div>
                <div class="flex gap-4">
                    <button onclick="window.location.href='dashboard.html'" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-bold transition shadow-md">لوحة التحكم</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 md:py-16">
        <div class="text-center mb-10 md:mb-16">
            <h1 class="text-4xl md:text-6xl font-black text-slate-900 mb-6 leading-tight">
                صمم <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">هويتك الرقمية</span> في ثوانٍ
            </h1>
        </div>

        <div id="loginStatus" class="hidden max-w-4xl mx-auto mb-6 bg-yellow-50 border border-yellow-200 text-yellow-800 px-4 py-3 rounded-xl flex items-center justify-between">
            <div class="flex items-center gap-3 font-bold">
                <i class="fa-solid fa-triangle-exclamation text-yellow-600 text-xl"></i>
                أنت لست مسجل الدخول! لن يتم حفظ بياناتك.
            </div>
            <a href="auth.html" class="bg-yellow-200 hover:bg-yellow-300 px-4 py-1.5 rounded-lg text-sm transition">تسجيل الدخول</a>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 flex flex-col lg:flex-row">
            
            <div class="w-full lg:w-1/2 p-6 md:p-8 border-b lg:border-b-0 lg:border-l border-slate-100">
                <h2 class="text-2xl font-bold mb-6 text-slate-800"><i class="fa-solid fa-pen-to-square ml-2 text-indigo-500"></i>بيانات الكارت</h2>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">الصورة الشخصية / اللوجو</label>
                        <input type="file" id="logoInput" accept="image/*" class="w-full text-sm p-2 border border-slate-300 rounded-xl bg-slate-50">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">الاسم الأساسي</label>
                        <input type="text" id="nameInput" placeholder="مثال: مطعم كذا / دكتور كذا" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 outline-none font-bold text-lg">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">الوصف الفرعي (اختياري)</label>
                        <input type="text" id="subNameInput" placeholder="@username" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 outline-none text-left" dir="ltr">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">الرابط (URL) الذي سيفتحه الكود</label>
                        <input type="url" id="urlInput" placeholder="https://..." class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-indigo-500 outline-none text-left" dir="ltr">
                    </div>

                    <button id="generateBtn" onclick="window.updateCardAndSave()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white text-lg font-bold py-4 rounded-xl shadow-lg transition">
                        <i class="fa-solid fa-wand-magic-sparkles ml-2"></i> تحديث وحفظ الكارت
                    </button>
                </div>
            </div>

            <div class="w-full lg:w-1/2 p-6 md:p-12 bg-slate-50 flex flex-col items-center justify-center relative overflow-hidden">
                
                <!-- حاوية الكارت الرئيسية -->
                <div id="capture-area" class="w-full max-w-[360px] bg-gradient-to-br from-indigo-600 via-purple-600 to-slate-900 rounded-[2.5rem] p-6 pt-20 pb-8 relative shadow-2xl transition-all duration-500">
                    
                    <div class="bg-dots rounded-3xl w-full p-6 text-center relative shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-white/40">
                        
                        <div class="absolute -top-16 left-1/2 transform -translate-x-1/2">
                            <div class="w-28 h-28 bg-white rounded-full p-1.5 shadow-xl ring-4 ring-white/30">
                                <img id="card-avatar" src="https://ui-avatars.com/api/?name=QC&background=4f46e5&color=fff&size=200" alt="Logo" class="w-full h-full rounded-full object-cover">
                            </div>
                        </div>

                        <div class="mt-12 px-2 pb-2">
                            <h3 id="card-title" class="text-2xl font-black text-slate-800 tracking-wide break-words whitespace-normal leading-relaxed pb-1">Beast Shado</h3>
                        </div>
                        <p id="card-subtitle" class="text-slate-500 font-medium mb-6 text-sm break-words whitespace-normal px-2 mt-1 pb-3 leading-relaxed">@username</p>

                        <div class="flex justify-center items-center mb-4">
                            <div id="qr-container" class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                                <div class="w-[200px] h-[200px] flex items-center justify-center bg-slate-50 rounded-xl border border-dashed border-slate-300 text-slate-400 text-sm">
                                    سيظهر الرمز هنا
                                </div>
                            </div>
                        </div>
                        
                        <!-- العلامة المائية المصغرة والأكثر أناقة -->
                        <div id="watermark-badge" class="mt-4 pt-2 flex items-center justify-center gap-1.5 text-slate-400 font-medium text-xs transition-opacity duration-300">
                            <svg class="opacity-70" width="12" height="12" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <rect width="12" height="12" rx="3" fill="#94a3b8"/>
                                <rect x="16" width="12" height="12" rx="3" fill="#cbd5e1"/>
                                <rect y="16" width="12" height="12" rx="3" fill="#cbd5e1"/>
                                <path d="M16 16H25C26.6569 16 28 17.3431 28 19V28H19C17.3431 28 16 26.6569 16 25V16Z" fill="#94a3b8"/>
                            </svg>
                            <span>مصنوع بواسطة كويك كود</span>
                        </div>
                    </div>
                </div>

                <button id="downloadBtn" onclick="downloadCardImage()" class="mt-8 w-full max-w-[360px] bg-emerald-500 hover:bg-emerald-600 text-white text-lg py-4 rounded-xl font-bold shadow-xl transition flex items-center justify-center gap-2 hidden">
                    <i class="fa-solid fa-download"></i> تحميل الكارت كصورة
                </button>
            </div>
        </div>
    </main>

    <div id="toastNotif" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-emerald-500 text-white px-6 py-3 rounded-full shadow-2xl font-bold transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center gap-3">
        <i class="fa-solid fa-check-circle text-xl"></i>
        <span id="toastMsg">تم الحفظ بنجاح!</span>
    </div>

    <script>
        function downloadCardImage() {
            const captureArea = document.getElementById('capture-area');
            const downloadBtn = document.getElementById('downloadBtn');
            const watermark = document.getElementById('watermark-badge');
            
            downloadBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> جاري التجهيز...';
            downloadBtn.classList.add('opacity-70', 'cursor-wait');

            // إذا كان المستخدم Pro، نخفي العلامة تماماً قبل لقطة الشاشة
            if (window.userIsPremium === true) {
                watermark.style.display = 'none';
            }

            // التصوير باستخدام html2canvas
            html2canvas(captureArea, { 
                scale: 3, // جودة عالية
                useCORS: true, 
                backgroundColor: null,
                scrollY: -window.scrollY,
                // مساحة إضافية لتفادي قص الحروف السفلية
                windowHeight: captureArea.scrollHeight + 50 
            }).then(canvas => {
                
                // استعادة ظهور العلامة المائية بعد التصوير لو كان مجاني
                if (window.userIsPremium === true) {
                    watermark.style.display = 'flex';
                }

                let link = document.createElement('a');
                
                // اسم ديناميكي للملف عشان ميقولكش إن الملف موجود قبل كده
                const timestamp = new Date().getTime();
                link.download = `QuickCode_Card_${timestamp}.png`;
                
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                downloadBtn.innerHTML = '<i class="fa-solid fa-download"></i> تحميل الكارت كصورة';
                downloadBtn.classList.remove('opacity-70', 'cursor-wait');
            }).catch(err => {
                if (window.userIsPremium === true) {
                    watermark.style.display = 'flex';
                }
                showToast("حدث خطأ أثناء تحميل الصورة.", true);
                downloadBtn.innerHTML = '<i class="fa-solid fa-download"></i> تحميل الكارت كصورة';
                downloadBtn.classList.remove('opacity-70', 'cursor-wait');
            });
        }
    </script>
</body>
</html>
